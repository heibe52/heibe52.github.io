<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heiko's App-Kiste</title>
    <style>
        :root {
            --bg-dark: #050814;
            --bg-light: #11182c;
            --font-stack: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at 50% 30%, var(--bg-light) 0%, var(--bg-dark) 100%);
            background-attachment: fixed;
            font-family: var(--font-stack);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- BACKGROUND ENGINE --- */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: 
                radial-gradient(1.5px 1.5px at 10% 20%, #fff 100%, transparent),
                radial-gradient(1px 1px at 30% 50%, #fff 100%, transparent),
                radial-gradient(2px 2px at 80% 10%, #fff 100%, transparent),
                radial-gradient(1px 1px at 90% 70%, #fff 100%, transparent),
                radial-gradient(1.5px 1.5px at 40% 80%, rgba(255,255,255,0.4) 100%, transparent),
                radial-gradient(1px 1px at 60% 30%, rgba(255,255,255,0.4) 100%, transparent);
            background-size: 250px 250px;
            opacity: 0.5;
        }

        .perspective-grid {
            position: fixed;
            bottom: -25vh; left: -50vw;
            width: 200vw; height: 70vh;
            background-image: 
                linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(600px) rotateX(75deg);
            mask-image: linear-gradient(to top, black 10%, transparent 80%);
            -webkit-mask-image: linear-gradient(to top, black 10%, transparent 80%);
            z-index: 0;
            pointer-events: none;
        }

        /* --- HEADER --- */
        header {
            margin-top: 12vh;
            margin-bottom: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        h1 {
            font-size: clamp(2rem, 4vw, 3.5rem);
            font-weight: 800;
            margin: 0;
            letter-spacing: 1px;
            background: linear-gradient(to right, #a5f3fc, #ffffff, #d8b4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 
                0 0 30px rgba(0, 240, 255, 0.4),
                0 0 50px rgba(177, 75, 244, 0.3);
        }

        .subtitle-pill {
            margin-top: 15px;
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #a5f3fc;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(0, 240, 255, 0.4);
            box-shadow: 
                0 0 15px rgba(0, 240, 255, 0.2),
                inset 0 0 10px rgba(0, 240, 255, 0.1);
            backdrop-filter: blur(8px);
        }

        /* --- GRID & CARDS (NATIVE CSS/SVG RENDERING) --- */
        .app-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 70px 60px; /* Vertikal 70px, Horizontal 60px */
            width: 90%;
            max-width: 1000px;
            z-index: 10;
            padding-bottom: 100px;
        }

        .card-wrapper {
            flex: 0 1 400px; /* Leicht verbreitert */
            height: 420px; /* Erhöht für mehr vertikalen Freiraum */
            border-radius: 18px;
            padding: 1.5px;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease, padding 0.3s ease;
            overflow: hidden;
            cursor: pointer;
        }

        .card-wrapper:hover {
            transform: translateY(-5px) scale(1.02);
            padding: 4px; /* Breiter Rand bei Berührung */
        }

        /* Rotierender animierter Rand */
        .card-wrapper::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 250%; height: 250%;
            transform: translate(-50%, -50%) rotate(0deg);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 0;
            pointer-events: none;
        }

        .card-wrapper:hover::before {
            opacity: 1;
            animation: borderSpin 3s linear infinite;
        }

        @keyframes borderSpin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .card-wrapper.amber {
            background: linear-gradient(135deg, rgba(255, 200, 114, 0.8), rgba(255, 255, 255, 0.1) 40%, rgba(255, 179, 71, 0.4));
            box-shadow: 0 0 40px rgba(255, 179, 71, 0.15);
        }
        
        .card-wrapper.amber::before {
            background: conic-gradient(from 0deg, transparent 60%, #ffc872, #f97316, transparent 80%);
        }
        
        .card-wrapper.blue {
            background: linear-gradient(135deg, rgba(177, 75, 244, 0.8), rgba(255, 255, 255, 0.1) 40%, rgba(0, 240, 255, 0.6));
            box-shadow: 0 0 40px rgba(71, 145, 255, 0.15);
        }

        .card-wrapper.blue::before {
            background: conic-gradient(from 0deg, transparent 60%, #00f2fe, #b14bf4, transparent 80%);
        }

        .app-card {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: rgba(22, 27, 44, 0.9);
            border-radius: 15px;
            padding: 45px 35px 35px 35px; /* Inneres Padding erhöht */
            text-decoration: none;
            color: var(--text-main);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .prism-flare {
            position: absolute;
            width: 150px; height: 150px;
            border-radius: 50%;
            filter: blur(40px);
            pointer-events: none;
            opacity: 0.6;
        }
        
        .amber .prism-flare.top-left { top: -50px; left: -50px; background: rgba(255, 255, 255, 0.15); }
        .amber .prism-flare.top-right { top: -50px; right: -50px; background: rgba(255, 179, 71, 0.1); }
        .blue .prism-flare.top-left { top: -50px; left: -50px; background: rgba(177, 75, 244, 0.2); }
        .blue .prism-flare.top-right { top: -50px; right: -50px; background: rgba(0, 240, 255, 0.15); }

        .icon-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 150px;
            margin-bottom: 30px; /* Abstand zum Titel erhöht */
            position: relative;
            z-index: 2;
        }

        .svg-icon {
            width: 140px; /* Leicht vergrößert passend zur Kachel */
            height: 140px;
        }
        
        .amber .svg-icon { filter: drop-shadow(0 0 15px rgba(255, 200, 114, 0.4)); }
        .blue .svg-icon { filter: drop-shadow(0 0 15px rgba(0, 240, 255, 0.4)); }

        .app-title {
            font-size: 1.4rem; /* Schriftgröße an Volumen angepasst */
            font-weight: 700;
            margin-bottom: 15px; /* Abstand zur Beschreibung erhöht */
            text-align: center;
            position: relative;
            z-index: 2;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .app-desc {
            font-size: 0.85rem;
            color: #f1f5f9;
            line-height: 1.6; /* Bessere Lesbarkeit */
            text-align: center;
            flex-grow: 1;
            position: relative;
            z-index: 2;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
            margin-bottom: 20px; /* Luft vor dem Footer */
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 25px; /* Abstand zur Trennlinie erhöht */
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 2;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-ready .status-dot { background-color: #10b981; box-shadow: 0 0 10px #10b981; }
        .status-ready .status-text { color: #10b981; }
        
        .status-pending .status-dot { background-color: #facc15; box-shadow: 0 0 10px #facc15; }
        .status-pending .status-text { color: #facc15; }

        .version-pill {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 14px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #f1f5f9;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <header>
        <h1>Heiko's App-Kiste</h1>
